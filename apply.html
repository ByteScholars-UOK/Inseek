<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Apply - Inseek</title>

	<link rel="icon" href="assets/images/logo-transparent.png">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="assets/css/global.css">
	<link rel="stylesheet" href="assets/css/apply.css">
</head>

<body class="dashboard_body d-flex flex-column min-vh-100">

	<nav class="dashboard_nav">

		<div class="container navbar-container">

			<a href="dashboard.html" class="navbar-logo-link">

				<img src="assets/images/logo-transparent.png" class="navbar-logo-img">

			</a>

			<ul class="nav_links navbar-menu">

				<li>
					<a href="dashboard.html" class="nav_link_active">
						Home
					</a>
				</li>

				<li>
					<a href="jobsearch.html" class="nav_link">
						Jobs
					</a>
				</li>

				<li>
					<a href="messages.html" class="nav_link">
						Messages
					</a>
				</li>

			<li>
				<a href="saved-jobs.html" class="nav_link">
					Saved
				</a>
			</li>
			<li>
				<a href="docs/process/index.html" class="nav_link">
					About
				</a>
			</li>

			</ul>

			<a href="profile.html" class="profile_button">

				<img src="assets/images/default-avatar.jpeg" class="avatar">

				<span class="profile_name profile-name-display">Me</span>

			</a>

		</div>

	</nav>

	<main class="flex-grow-1">
		<div class="apply_container" style="max-width: 700px; margin: 40px auto; padding: 30px;">

			<h2 class="fw-bold mb-3" style="color: var(--text-main);">Apply for a Job</h2>

			<div class="d-flex justify-content-between align-items-center mb-4">
				<div class="step-indicator flex-fill" id="step-indicator-1" style="height: 4px; background-color: var(--brand); border-radius: 2px; margin-right: 4px;"></div>
				<div class="step-indicator flex-fill" id="step-indicator-2" style="height: 4px; background-color: #dee2e6; border-radius: 2px; margin-right: 4px;"></div>
				<div class="step-indicator flex-fill" id="step-indicator-3" style="height: 4px; background-color: #dee2e6; border-radius: 2px;"></div>
			</div>

			<form id="multiStepForm" novalidate>

				<div class="form-step" id="step-1" style="display: block;">

					<div style="background-color: var(--bg-off-white); border: 1px solid rgba(0,0,0,0.08); border-radius: 16px; padding: 28px; margin-bottom: 20px;">
						<h3 class="mb-4 fw-bold" style="color: var(--text-main); font-size: 20px;">Personal Information</h3>

						<div class="field mb-3 d-flex flex-column text-start">
							<label for="name" class="form-label fw-medium mb-2" style="color: var(--text-main);">Full Name *</label>
							<input type="text" class="form-control" id="name" name="name" placeholder="Yasith Harasara" style="border-radius: 10px; padding: 12px; border: 1px solid rgba(0,0,0,0.1);">
							<small class="text-danger mt-1 d-block"></small>
						</div>

						<div class="field mb-3 d-flex flex-column text-start">
							<label for="address" class="form-label fw-medium mb-2" style="color: var(--text-main);">Permanent Address *</label>
							<textarea class="form-control" id="address" name="address" rows="2" placeholder="Enter your permanent address" style="border-radius: 10px; padding: 12px; border: 1px solid rgba(0,0,0,0.1);"></textarea>
							<small class="text-danger mt-1 d-block"></small>
						</div>

						<div class="field mb-3 d-flex flex-column text-start">
							<label for="nic" class="form-label fw-medium mb-2" style="color: var(--text-main);">NIC / Passport Number *</label>
							<input type="text" class="form-control" id="nic" name="nic" placeholder="e.g. 1999XXXXXXXX or 99XXXXXXV" style="border-radius: 10px; padding: 12px; border: 1px solid rgba(0,0,0,0.1);">
							<small class="text-danger mt-1 d-block"></small>
						</div>

						<div class="field mb-3 d-flex flex-column text-start">
							<label for="email" class="form-label fw-medium mb-2" style="color: var(--text-main);">Email Address *</label>
							<input type="email" class="form-control" id="email" name="email" placeholder="johnsmith@gmail.com" style="border-radius: 10px; padding: 12px; border: 1px solid rgba(0,0,0,0.1);">
							<small class="text-danger mt-1 d-block"></small>
						</div>

						<div class="field d-flex flex-column text-start">
							<label for="phone" class="form-label fw-medium mb-2" style="color: var(--text-main);">Contact Number *</label>
							<input type="text" class="form-control" id="phone" name="phone" placeholder="e.g. 0771234567" style="border-radius: 10px; padding: 12px; border: 1px solid rgba(0,0,0,0.1);">
							<small class="text-danger mt-1 d-block"></small>
						</div>
					</div>

					<div class="d-flex justify-content-end">
						<button type="button" class="submit_button fw-bold" id="btn-next-1" style="border: none; padding: 12px 28px; border-radius: 10px; cursor: pointer;">Next Step →</button>
					</div>

				</div>

				<div class="form-step" id="step-2" style="display: none;">
					<div style="background-color: var(--bg-off-white); border: 1px solid rgba(0,0,0,0.08); border-radius: 16px; padding: 28px; margin-bottom: 20px;">
						<h3 class="mb-4 fw-bold" style="color: var(--text-main); font-size: 20px;">Resume & Skills</h3>

						<div class="field mb-3 d-flex flex-column text-start">
							<label for="resume" class="form-label fw-medium mb-2" style="color: var(--text-main);">Upload Resume (PDF only) *</label>
							<input type="file" class="form-control" id="resume" name="resume" accept=".pdf" style="border-radius: 10px; padding: 12px; border: 1px solid rgba(0,0,0,0.1);">
							<small class="text-danger mt-1 d-block"></small>
						</div>

						<div class="field mb-3 d-flex flex-column text-start">
							<label for="skills" class="form-label fw-medium mb-2" style="color: var(--text-main);">Top Skills *</label>
							<input type="text" class="form-control" id="skills" name="skills" list="skills-list" placeholder="Type or select your primary skill..." style="border-radius: 10px; padding: 12px; border: 1px solid rgba(0,0,0,0.1);">

							<datalist id="skills-list">


								<option value="Software Engineer" label="IT Section"></option>
								<option value="UI/UX Designer" label="IT Section"></option>
								<option value="Frontend Developer" label="IT Section"></option>
								<option value="Cybersecurity Analyst" label="IT Section"></option>
								<option value="Data Scientist" label="IT Section"></option>




								<option value="Digital Marketing Specialist" label="Marketing Section"></option>
								<option value="Social Media Manager" label="Marketing Section"></option>
								<option value="Sales Executive" label="Marketing Section"></option>
								<option value="Brand Manager" label="Marketing Section"></option>
								<option value="Content Strategist" label="Marketing Section"></option>



								<option value="Chartered Accountant" label="Finance Section"></option>
								<option value="Financial Analyst" label="Finance Section"></option>
								<option value="Investment Banker" label="Finance Section"></option>
								<option value="Audit Associate" label="Finance Section"></option>
								<option value="Tax Consultant" label="Finance Section"></option>




								<option value="Medical Laboratory Technologist" label="Healthcare Section"></option>
								<option value="Nursing Officer" label="Healthcare Section"></option>
								<option value="Healthcare Administrator" label="Healthcare Section"></option>
								<option value="Pharmacist" label="Healthcare Section"></option>
								<option value="Data Analyst (Healthcare)" label="Healthcare Section"></option>
							</datalist>

							<small class="text-danger mt-1 d-block"></small>
						</div>




						<div class="field mb-3 d-flex flex-column text-start">
							<label for="experience" class="form-label fw-medium mb-2" style="color: var(--text-main);">Years of Work Experience *</label>
							<input type="number" class="form-control" id="experience" name="experience" min="0" max="40" placeholder="e.g. 2 (Enter 0 if Fresher)" style="border-radius: 10px; padding: 12px; border: 1px solid rgba(0,0,0,0.1);">
							<small class="text-danger mt-1 d-block"></small>
						</div>

						<div class="field mb-3 d-flex flex-column text-start">
							<label for="prev-job" class="form-label fw-medium mb-2" style="color: var(--text-main);">Previous Job Title & Company *</label>
							<input type="text" class="form-control" id="prev-job" name="prev-job" placeholder="e.g. Junior Executive at ABC Corp" style="border-radius: 10px; padding: 12px; border: 1px solid rgba(0,0,0,0.1);">
							<small class="text-danger mt-1 d-block"></small>
						</div>

						<div class="field d-flex flex-column text-start">
							<label for="portfolio" class="form-label fw-medium mb-2" style="color: var(--text-main);">Portfolio / LinkedIn URL</label>
							<input type="url" class="form-control" id="portfolio" name="portfolio" placeholder="https://example.com" style="border-radius: 10px; padding: 12px; border: 1px solid rgba(0,0,0,0.1);">
							<small class="text-danger mt-1 d-block"></small>
						</div>




					</div>

					<div class="d-flex justify-content-between">
						<button type="button" class="btn btn-outline-secondary fw-bold rounded-3 px-4 py-2" id="btn-back-2">← Back</button>
						<button type="button" class="submit_button fw-bold" id="btn-next-2" style="border: none; padding: 12px 28px; border-radius: 10px; cursor: pointer;">Next Step →</button>
					</div>
				</div>

				<div class="form-step" id="step-3" style="display: none;">

					<div style="background-color: var(--bg-off-white); border: 1px solid rgba(0,0,0,0.08); border-radius: 16px; padding: 28px; margin-bottom: 20px;">
						<h3 class="mb-4 fw-bold" style="color: var(--text-main); font-size: 20px;">Review & Submit</h3>

						<div class="field mb-3 d-flex flex-column text-start">
							<label for="start-date" class="form-label fw-medium mb-2" style="color: var(--text-main);">Available Start Date *</label>
							<input type="date" class="form-control" id="start-date" name="start-date" style="border-radius: 10px; padding: 12px; border: 1px solid rgba(0,0,0,0.1);">
							<small class="text-danger mt-1 d-block"></small>
						</div>

						<div class="field mb-3 d-flex flex-column text-start">
							<label for="comments" class="form-label fw-medium mb-2" style="color: var(--text-main);">Additional Comments / Cover Letter</label>
							<textarea class="form-control" id="comments" name="comments" rows="3" placeholder="Anything else you would like to share with us..." style="border-radius: 10px; padding: 12px; border: 1px solid rgba(0,0,0,0.1);"></textarea>
							<small class="text-danger mt-1 d-block"></small>
						</div>

						<div class="field mb-2 d-flex align-items-start gap-2 text-start pt-2">
							<input type="checkbox" class="form-check-input mt-1" id="terms" name="terms" style="border-color: rgba(0,0,0,0.25);">
							<label class="form-check-label fs-6" for="terms" style="color: var(--text-main);">I agree to the terms and conditions and certify that the entered data is correct. *</label>
						</div>
						<div class="text-start mb-2">
							<small class="text-danger d-block" id="terms-error"></small>
						</div>
					</div>

					<div class="d-flex justify-content-between">
						<button type="button" class="btn btn-outline-secondary fw-bold rounded-3 px-4 py-2" id="btn-back-3">← Back</button>
						<button type="submit" class="submit_button fw-bold" id="btn-submit" style="border: none; padding: 12px 32px; border-radius: 10px; cursor: pointer;">Submit Application</button>
					</div>
				</div>

			</form>

			<div id="live_clock" style="display:none; text-align:center; margin-top:20px; padding:12px; background:#e6ffe6; border-radius:8px; font-weight:bold; color:#0B0F19;"></div>

		</div>
	</main>

	<div style="margin-top: auto;">

		<script src="footer.js"></script>

	</div>

	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="assets/js/apply.js"></script>

<script>

(function(){var n=localStorage.getItem('profile_first_name')||localStorage.getItem('user_name');if(n){  var e=document.querySelectorAll('.profile-name-display');  for(var i=0;i<e.length;i++)e[i].textContent=n;  }var p=localStorage.getItem('profile_photo');if(p){var a=document.querySelectorAll('.avatar');for(var i=0;i<a.length;i++)a[i].src=p;}})();
</script>

</body>
</html>
