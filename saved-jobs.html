<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inseek. - Saved Jobs</title>
    <link rel="icon" href="assets/images/logo-transparent.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/global.css">

    <style>
        .saved-card {
            transition: opacity 0.3s, transform 0.3s;
        }
        .saved-card.removing {
            opacity: 0;
            transform: translateX(-20px);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 64px;
            color: #ccc;
        }
        .empty-state h4 {
            margin-top: 16px;
            color: #333;
        }
        .empty-state p {
            color: #999;
        }
        .company-initial {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            background: var(--bg-off-white);
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            flex-shrink: 0;
        }
        @media (max-width: 768px) {
            .saved-table thead {
                display: none;
            }
            .saved-table tbody tr {
                display: block;
                border: 1px solid #e0e0e0;
                border-radius: 12px;
                margin-bottom: 16px;
                padding: 16px;
                background: #fff;
            }
            .saved-table tbody tr td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 0;
                border: none;
            }
            .saved-table tbody tr td:before {
                content: attr(data-label);
                font-weight: 600;
                font-size: 13px;
                color: var(--text-muted);
            }
        }
    </style>
</head>
<body class="dashboard-body d-flex flex-column min-vh-100">

    <nav class="dashboard_nav">
        <div class="container navbar-container">
            <a href="dashboard.html" class="navbar-logo-link">
                <img src="assets/images/logo-transparent.png" alt="Inseek" class="navbar-logo-img">
            </a>
            <ul class="nav_links navbar-menu">
                <li><a href="dashboard.html" class="nav_link">Home</a></li>
                <li><a href="jobsearch.html" class="nav_link">Jobs</a></li>
                <li><a href="messages.html" class="nav_link">Messages</a></li>
                <li><a href="saved-jobs.html" class="nav_link_active">Saved</a></li>
                <li><a href="docs/process/index.html" class="nav_link">About</a></li>
            </ul>
            <a href="profile.html" class="profile_button">
                <img src="assets/images/default-avatar.jpeg" alt="Profile" class="avatar">
                <span class="profile_name profile-name-display">Me</span>
            </a>
        </div>
    </nav>

    <main class="flex-grow-1 container py-4 py-md-5">
        <div class="page-header d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 fw-bold mb-0">Saved Jobs</h1>
            <span id="savedCount" class="badge bg-primary fs-6">0 Saved Jobs</span>
        </div>

        <div class="table-responsive rounded-3 border bg-white">
            <table class="table align-middle mb-0 saved-table" id="savedTable">
                <thead class="bg-light text-secondary">
                    <tr>
                        <th class="py-3 fw-semibold">Company & Role</th>
                        <th class="py-3 fw-semibold">Location</th>
                        <th class="py-3 fw-semibold">Category</th>
                        <th class="py-3 fw-semibold">Type</th>
                        <th class="py-3 fw-semibold">Salary</th>
                        <th class="py-3 fw-semibold">Actions</th>
                    </tr>
                </thead>
                <tbody id="savedJobsBody"></tbody>
            </table>
        </div>
    </main>

    <div style="margin-top: auto;">
        <script src="footer.js"></script>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    function getSavedJobs() {
        var stored = localStorage.getItem('inseek_saved_jobs');
        return stored ? JSON.parse(stored) : [];
    }

    function setSavedJobs(jobs) {
        localStorage.setItem('inseek_saved_jobs', JSON.stringify(jobs));
    }

    function renderSavedJobs() {
        var jobs = getSavedJobs();
        var $tbody = $('#savedJobsBody');
        var $count = $('#savedCount');
        $tbody.empty();
        $count.text(jobs.length + ' Saved Job' + (jobs.length !== 1 ? 's' : ''));

        if (jobs.length === 0) {
            $tbody.append(
                '<tr><td colspan="6" class="empty-state">' +
                    '<i class="bi bi-bookmark-x"></i>' +
                    '<h4>No Saved Jobs</h4>' +
                    '<p>Save jobs from the <a href="jobsearch.html" class="text-brand">Jobs</a> page to see them here.</p>' +
                '</td></tr>'
            );
            return;
        }

        jobs.forEach(function(job, index) {
            var initial = job.company ? job.company.charAt(0).toUpperCase() : '?';
            var tr = '<tr class="saved-card" data-index="' + index + '">' +
                '<td data-label="Company & Role">' +
                    '<div class="d-flex align-items-center gap-3">' +
                        '<div class="company-initial">' + initial + '</div>' +
                        '<div>' +
                            '<h4 class="h6 mb-0 fw-bold">' + job.title + '</h4>' +
                            '<span class="text-muted small">' + job.company + '</span>' +
                        '</div>' +
                    '</div>' +
                '</td>' +
                '<td data-label="Location">' + (job.location || '-') + '</td>' +
                '<td data-label="Category"><span class="badge bg-light text-dark border">' + (job.category || '-') + '</span></td>' +
                '<td data-label="Type">' + (job.type || '-') + '</td>' +
                '<td data-label="Salary" class="text-success fw-medium"><small>' + (job.salary || '-') + '</small></td>' +
                '<td data-label="Actions">' +
                    '<div class="d-flex gap-2">' +
                        '<a href="apply.html" class="btn btn-sm btn-outline-primary">Apply</a>' +
                        '<button class="btn btn-sm btn-outline-danger remove-btn" data-index="' + index + '"><i class="bi bi-trash"></i></button>' +
                    '</div>' +
                '</td>' +
            '</tr>';
            $tbody.append(tr);
        });

        $('.remove-btn').on('click', function() {
            var idx = parseInt($(this).data('index'));
            var jobs = getSavedJobs();
            jobs.splice(idx, 1);
            setSavedJobs(jobs);
            renderSavedJobs();
        });
    }

    $(document).ready(function() {
        renderSavedJobs();
    });
    </script>

<script>
(function(){var n=localStorage.getItem('profile_first_name')||localStorage.getItem('user_name');if(n){var els=document.querySelectorAll('.profile-name-display');for(var j=0;j<els.length;j++)els[j].textContent=n;}var p=localStorage.getItem('profile_photo');if(p){var imgs=document.querySelectorAll('.avatar');for(var j=0;j<imgs.length;j++)imgs[j].src=p;}})();
</script>
</body>
</html>
