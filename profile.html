<!-- profile page - Nisagi built this. resume style layout -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
	<title>My Profile</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

   
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="assets/css/global.css">

    <style>
        body{
            background-color: #f8f9fa;
        }

        .profile-card{
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.08);
        }

        .custom-btn{
            background-color: #0059c6;
            color: white;
            border: none;
        }

        .custom-btn:hover{
            background-color: #0047a0;
            color: white;
        }

        .section-title{
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<nav class="dashboard_nav">

        <div class="container navbar-container">

            <a href="dashboard.html" class="navbar-logo-link">
                <img src="assets/images/logo-transparent.png" alt="Inseek" class="navbar-logo-img">
            </a>

            <ul class="nav_links navbar-menu">
                <li>
                    <a href="dashboard.html" class="nav_link_active">
                        Home
                    </a>
                </li>
                <li>
                    <a href="jobsearch.html" class="nav_link">
                        Jobs
                    </a>
                </li>
                <li>
                    <a href="apply.html" class="nav_link">
                        Apply
                    </a>
                </li>
                <li>
                    <a href="saved-jobs.html" class="nav_link">
                        Saved Jobs
                    </a>
                </li>
            </ul>

            <a href="profile.html" class="profile_button">
                <img src="assets/images/default-avatar.jpeg" alt="Profile" class="avatar">
                <span class="profile_name profile-name-display">Me</span>
            </a>
        </div>
    </nav>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="profile-card">

              
                <h2 class="text-center fw-bold mb-5">
                    My Profile
                </h2>

             
                    <div class="text-center mb-5">

                    <img id="profileImage"
                         src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                         alt="Profile"
                         class="rounded-circle border shadow"
                         style="width:200px;height:200px;object-fit:cover;">

                    <input type="file"
                           id="photoInput"
                           accept="image/*"
                           class="d-none">

                    <div class="mt-3">
                        <button type="button"
                                class="btn btn-outline-primary rounded-pill"
                                onclick="document.getElementById('photoInput').click()">
                            <i class="bi bi-camera-fill me-2"></i>
                            Change Photo
                        </button>
                    </div>

                </div>

                
                <h4 class="section-title border-top pt-4">
                    Basic Information
                </h4>

                <div class="row g-4">

                    <div class="col-md-4">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" value="Nisagi">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Middle Name</label>
                        <input type="text" class="form-control" placeholder="Ex: Ahamed">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" value="Damsari">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label d-block">Gender</label>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gender">
                            <label class="form-check-label">Male</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gender">
                            <label class="form-check-label">Female</label>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Career Status</label>

                        <select class="form-select">

                            <option selected disabled>Select Career Status</option>
                            <option>Student</option>
                            <option>Intern</option>
                            <option>Undergraduate</option>
                            <option>Graduate</option>
                            <option>Employed</option>

                        </select>

                    </div>

                </div>

             
                <h4 class="section-title border-top pt-4 mt-5">
                    Contact Information
                </h4>

                <div class="row g-4">

                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Address Line 1</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Address Line 2</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">City / Town</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Country</label>

                        <select class="form-select">
                            <option>Sri Lanka</option>
                            <option>India</option>
                            <option>United Kingdom</option>
                            <option>Australia</option>
                            <option>Canada</option>
                        </select>
                    </div>

                </div>

             
                <div class="text-center mt-5">

                    <button class="btn custom-btn px-5 py-2">
                        Save Changes
                    </button>
						
                </div>

            </div>

        </div>

    </div>

</div>


<script src="footer.js"></script>

<script src="assets/js/profile.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>




</body>
</html>
